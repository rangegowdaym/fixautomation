# QuickFIX/J Session Configuration
# This file is loaded by FixSessionManager at runtime.
# Update host/port to match your FIX engine environment.

[DEFAULT]
ConnectionType=initiator
ReconnectInterval=10
HeartBtInt=30
FileStorePath=target/quickfix/store
FileLogPath=target/quickfix/log
StartTime=00:00:00
EndTime=00:00:00
UseDataDictionary=Y
DataDictionary=FIX44.xml
ValidateUserDefinedFields=N
ValidateIncomingMessage=N
ResetOnLogon=Y
ResetOnLogout=Y
ResetOnDisconnect=Y

[SESSION]
BeginString=FIX.4.4
SenderCompID=CLIENT
TargetCompID=SERVER
SocketConnectHost=localhost
SocketConnectPort=9878
