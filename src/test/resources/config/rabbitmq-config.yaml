# RabbitMQ Management API Configuration

rabbitmq:
  management:
    host: http://localhost:15672
    username: guest
    password: guest
    vhost: /
  request-queue: order-request-queue
  response-queue: order-response-queue

polling:
  timeout-seconds: 30
  interval-millis: 500

