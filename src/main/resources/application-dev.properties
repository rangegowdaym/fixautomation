# WebSocket Configuration
websocket.url=ws://localhost:8080/ws/orders

# RabbitMQ Management API
rabbitmq.management.host=http://localhost:15672
rabbitmq.management.username=guest
rabbitmq.management.password=guest
rabbitmq.management.vhost=/
rabbitmq.request.queue=order-request-queue
rabbitmq.response.queue=order-response-queue

# Timeout / Retry Configuration
polling.timeout.seconds=30
polling.interval.millis=500
websocket.ack.timeout.seconds=10
