# WebSocket Configuration
websocket.url=ws://uat-host:8080/ws/orders

# RabbitMQ Management API
rabbitmq.management.host=http://uat-rabbitmq:15672
rabbitmq.management.username=uat_user
rabbitmq.management.password=uat_pass
rabbitmq.management.vhost=/uat
rabbitmq.request.queue=order-request-queue
rabbitmq.response.queue=order-response-queue

# Timeout / Retry Configuration
polling.timeout.seconds=60
polling.interval.millis=1000
websocket.ack.timeout.seconds=15
